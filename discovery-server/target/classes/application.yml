server:
  port: 8761

spring:
  application:
    name: DISCOVERY-SERVER

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

  server:
    enable-self-preservation: false

logging:
  file:
    name: logs/discovery.log
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: "*"